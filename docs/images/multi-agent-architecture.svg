<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Multi-Agent Architecture</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#666">How orchestrators, sub-agents, and shared resources coordinate</text>

  <!-- PO (Human) -->
  <rect x="370" y="74" width="160" height="48" rx="24" fill="#117076" filter="url(#shadow)"/>
  <text x="450" y="103" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Product Owner</text>

  <!-- Arrow PO to Orchestrator -->
  <line x1="450" y1="122" x2="450" y2="152" stroke="#117076" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <defs><marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#117076"/></marker></defs>

  <!-- Orchestrator -->
  <rect x="320" y="154" width="260" height="56" rx="8" fill="#fff" stroke="#117076" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#117076">Orchestrator</text>
  <text x="450" y="198" text-anchor="middle" font-size="11" fill="#666">Checks board, dispatches agents, briefs PO</text>

  <!-- Sub-agents -->
  <rect x="60" y="274" width="180" height="56" rx="8" fill="#fff" stroke="#75bcbe" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="298" text-anchor="middle" font-size="13" font-weight="600" fill="#117076">Mosaic Agent</text>
  <text x="150" y="316" text-anchor="middle" font-size="10" fill="#666">Product delivery</text>

  <rect x="280" y="274" width="180" height="56" rx="8" fill="#fff" stroke="#75bcbe" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="298" text-anchor="middle" font-size="13" font-weight="600" fill="#117076">Website Agent</text>
  <text x="370" y="316" text-anchor="middle" font-size="10" fill="#666">Site + admin</text>

  <rect x="500" y="274" width="180" height="56" rx="8" fill="#fff" stroke="#75bcbe" stroke-width="2" filter="url(#shadow)"/>
  <text x="590" y="298" text-anchor="middle" font-size="13" font-weight="600" fill="#117076">Lead Engine Agent</text>
  <text x="590" y="316" text-anchor="middle" font-size="10" fill="#666">Outreach + CRM</text>

  <rect x="720" y="274" width="140" height="56" rx="8" fill="#fff" stroke="#B8953E" stroke-width="2" filter="url(#shadow)"/>
  <text x="790" y="298" text-anchor="middle" font-size="13" font-weight="600" fill="#B8953E">Dash (xyz)</text>
  <text x="790" y="316" text-anchor="middle" font-size="10" fill="#666">Autonomous agent</text>

  <!-- Arrows orchestrator to sub-agents -->
  <line x1="380" y1="210" x2="150" y2="274" stroke="#75bcbe" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="420" y1="210" x2="370" y2="274" stroke="#75bcbe" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="490" y1="210" x2="590" y2="274" stroke="#75bcbe" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="530" y1="210" x2="790" y2="274" stroke="#B8953E" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Shared resources bar -->
  <text x="450" y="378" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Shared Resources</text>
  <line x1="100" y1="388" x2="800" y2="388" stroke="#ddd" stroke-width="1"/>

  <!-- Board -->
  <rect x="60" y="404" width="220" height="80" rx="8" fill="#117076" filter="url(#shadow)"/>
  <text x="170" y="432" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Kanban Board</text>
  <text x="170" y="452" text-anchor="middle" font-size="11" fill="#d4f0f0">Single source of truth</text>
  <text x="170" y="468" text-anchor="middle" font-size="11" fill="#d4f0f0">Cards, WIP limits, age</text>

  <!-- Knowledge -->
  <rect x="320" y="404" width="220" height="80" rx="8" fill="#75bcbe" filter="url(#shadow)"/>
  <text x="430" y="432" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Knowledge System</text>
  <text x="430" y="452" text-anchor="middle" font-size="11" fill="#e8f6f6">Observations, hypotheses, rules</text>
  <text x="430" y="468" text-anchor="middle" font-size="11" fill="#e8f6f6">Compounds across sessions</text>

  <!-- Secrets -->
  <rect x="580" y="404" width="220" height="80" rx="8" fill="#444" filter="url(#shadow)"/>
  <text x="690" y="432" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Secrets Store</text>
  <text x="690" y="452" text-anchor="middle" font-size="11" fill="#ccc">Encrypted (pass)</text>
  <text x="690" y="468" text-anchor="middle" font-size="11" fill="#ccc">Never in code or output</text>

  <!-- Connections from agents to shared resources -->
  <line x1="150" y1="330" x2="170" y2="404" stroke="#117076" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="370" y1="330" x2="170" y2="404" stroke="#117076" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="590" y1="330" x2="170" y2="404" stroke="#117076" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="790" y1="330" x2="170" y2="404" stroke="#117076" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <line x1="150" y1="330" x2="430" y2="404" stroke="#75bcbe" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="370" y1="330" x2="430" y2="404" stroke="#75bcbe" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="590" y1="330" x2="430" y2="404" stroke="#75bcbe" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="790" y1="330" x2="430" y2="404" stroke="#75bcbe" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Legend -->
  <rect x="60" y="520" width="780" height="56" rx="6" fill="#f5f5f5" stroke="#e0e0e0"/>
  <line x1="100" y1="548" x2="130" y2="548" stroke="#75bcbe" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="138" y="552" font-size="11" fill="#666">Dispatches sub-agent</text>
  <line x1="320" y1="548" x2="350" y2="548" stroke="#117076" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="358" y="552" font-size="11" fill="#666">Reads/writes shared resource</text>
  <rect x="560" y="540" width="12" height="12" rx="2" fill="#fff" stroke="#B8953E" stroke-width="2"/>
  <text x="580" y="552" font-size="11" fill="#666">Autonomous (owns its own board)</text>
</svg>
