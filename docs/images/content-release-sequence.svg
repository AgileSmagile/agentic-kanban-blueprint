<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow5" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Content Release Sequence</text>
  <text x="450" y="48" text-anchor="middle" font-size="12" fill="#666">4 weeks of content from one blueprint release</text>

  <!-- Week headers -->
  <text x="140" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#117076">Week 1</text>
  <text x="350" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#117076">Week 2</text>
  <text x="560" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#117076">Week 3</text>
  <text x="770" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#117076">Week 4</text>

  <!-- Vertical dividers -->
  <line x1="245" y1="68" x2="245" y2="380" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="455" y1="68" x2="455" y2="380" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="665" y1="68" x2="665" y2="380" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Row labels -->
  <text x="36" y="130" font-size="11" font-weight="600" fill="#666">Articles</text>
  <text x="36" y="210" font-size="11" font-weight="600" fill="#666">Videos</text>
  <text x="36" y="310" font-size="11" font-weight="600" fill="#666">Short</text>
  <text x="36" y="324" font-size="11" font-weight="600" fill="#666">posts</text>

  <!-- Horizontal dividers -->
  <line x1="30" y1="160" x2="870" y2="160" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="30" y1="260" x2="870" y2="260" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Week 1 -->
  <rect x="72" y="100" width="136" height="48" rx="6" fill="#117076" filter="url(#shadow5)"/>
  <text x="140" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">I gave AI agents</text>
  <text x="140" y="136" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">a Kanban board</text>

  <rect x="72" y="176" width="136" height="64" rx="6" fill="#75bcbe" filter="url(#shadow5)"/>
  <text x="140" y="196" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Full walkthrough</text>
  <text x="140" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">15 min video</text>
  <text x="140" y="230" text-anchor="middle" font-size="9" fill="#e8f6f6">YouTube + LinkedIn</text>

  <!-- Week 2 -->
  <rect x="282" y="176" width="136" height="64" rx="6" fill="#75bcbe" filter="url(#shadow5)"/>
  <text x="350" y="196" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Mistakes we made</text>
  <text x="350" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">10 min video</text>
  <text x="350" y="230" text-anchor="middle" font-size="9" fill="#e8f6f6">Highest engagement</text>

  <rect x="268" y="276" width="76" height="40" rx="4" fill="#B8953E" filter="url(#shadow5)"/>
  <text x="306" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Review</text>
  <text x="306" y="308" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">queue</text>

  <rect x="356" y="276" width="76" height="40" rx="4" fill="#B8953E" filter="url(#shadow5)"/>
  <text x="394" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">WIP</text>
  <text x="394" y="308" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">limits</text>

  <!-- Week 3 -->
  <rect x="492" y="176" width="136" height="64" rx="6" fill="#75bcbe" filter="url(#shadow5)"/>
  <text x="560" y="196" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Instructions that</text>
  <text x="560" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">agents follow</text>
  <text x="560" y="230" text-anchor="middle" font-size="9" fill="#e8f6f6">8 min video</text>

  <rect x="478" y="276" width="76" height="40" rx="4" fill="#B8953E" filter="url(#shadow5)"/>
  <text x="516" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Empty</text>
  <text x="516" y="308" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">cards</text>

  <rect x="566" y="276" width="76" height="40" rx="4" fill="#B8953E" filter="url(#shadow5)"/>
  <text x="604" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Security</text>
  <text x="604" y="308" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">= hooks</text>

  <!-- Week 4 -->
  <rect x="702" y="100" width="136" height="48" rx="6" fill="#117076" filter="url(#shadow5)"/>
  <text x="770" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Agent needs a</text>
  <text x="770" y="136" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">personality</text>

  <rect x="702" y="176" width="136" height="64" rx="6" fill="#75bcbe" filter="url(#shadow5)"/>
  <text x="770" y="196" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Knowledge system</text>
  <text x="770" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">10 min video</text>
  <text x="770" y="230" text-anchor="middle" font-size="9" fill="#e8f6f6">Most differentiated</text>

  <rect x="688" y="276" width="76" height="40" rx="4" fill="#B8953E" filter="url(#shadow5)"/>
  <text x="726" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Dash chose</text>
  <text x="726" y="308" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">its name</text>

  <!-- Legend -->
  <rect x="200" y="350" width="500" height="52" rx="6" fill="#f5f5f5" stroke="#e0e0e0"/>
  <rect x="224" y="366" width="14" height="14" rx="2" fill="#117076"/>
  <text x="246" y="378" font-size="11" fill="#444">Article (LinkedIn)</text>
  <rect x="370" y="366" width="14" height="14" rx="2" fill="#75bcbe"/>
  <text x="392" y="378" font-size="11" fill="#444">Video (YouTube + LinkedIn)</text>
  <rect x="550" y="366" width="14" height="14" rx="2" fill="#B8953E"/>
  <text x="572" y="378" font-size="11" fill="#444">Short post (LinkedIn)</text>
</svg>
