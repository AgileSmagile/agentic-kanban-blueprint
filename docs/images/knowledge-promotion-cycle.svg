<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow2" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#117076"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#cc4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Knowledge Promotion Cycle</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#666">How observations become confirmed rules over time</text>

  <!-- Tier 1: Observation -->
  <rect x="40" y="100" width="200" height="120" rx="8" fill="#fff" stroke="#75bcbe" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="40" y="100" width="200" height="32" rx="8" fill="#75bcbe"/>
  <rect x="40" y="124" width="200" height="2" fill="#75bcbe"/>
  <text x="140" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Observation</text>
  <text x="140" y="152" text-anchor="middle" font-size="11" fill="#444">"This API returns errors</text>
  <text x="140" y="168" text-anchor="middle" font-size="11" fill="#444">when called too quickly"</text>
  <text x="140" y="196" text-anchor="middle" font-size="10" fill="#888">Raw. Written by any agent.</text>
  <text x="140" y="210" text-anchor="middle" font-size="10" fill="#888">No confirmation needed.</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="160" x2="296" y2="160" stroke="#117076" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="268" y="150" text-anchor="middle" font-size="10" fill="#117076" font-weight="600">Pattern</text>
  <text x="268" y="162" text-anchor="middle" font-size="10" fill="#117076" font-weight="600">emerges</text>

  <!-- Tier 2: Hypothesis -->
  <rect x="300" y="100" width="200" height="120" rx="8" fill="#fff" stroke="#B8953E" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="300" y="100" width="200" height="32" rx="8" fill="#B8953E"/>
  <rect x="300" y="124" width="200" height="2" fill="#B8953E"/>
  <text x="400" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Hypothesis</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#444">"Rate limiting at 10 req/s</text>
  <text x="400" y="168" text-anchor="middle" font-size="11" fill="#444">prevents API errors"</text>
  <text x="400" y="196" text-anchor="middle" font-size="10" fill="#888">Testable. Tracked with</text>
  <text x="400" y="210" text-anchor="middle" font-size="10" fill="#888">confirmation count.</text>

  <!-- Arrow 2 -->
  <line x1="500" y1="160" x2="556" y2="160" stroke="#117076" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="528" y="146" text-anchor="middle" font-size="10" fill="#117076" font-weight="600">5+</text>
  <text x="528" y="158" text-anchor="middle" font-size="10" fill="#117076" font-weight="600">confirms</text>

  <!-- Tier 3: Rule -->
  <rect x="560" y="100" width="200" height="120" rx="8" fill="#fff" stroke="#117076" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="560" y="100" width="200" height="32" rx="8" fill="#117076"/>
  <rect x="560" y="124" width="200" height="2" fill="#117076"/>
  <text x="660" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Rule</text>
  <text x="660" y="152" text-anchor="middle" font-size="11" fill="#444">"All API routes must have</text>
  <text x="660" y="168" text-anchor="middle" font-size="11" fill="#444">per-user rate limits"</text>
  <text x="660" y="196" text-anchor="middle" font-size="10" fill="#888">Confirmed. Applied by</text>
  <text x="660" y="210" text-anchor="middle" font-size="10" fill="#888">default. No justification.</text>

  <!-- Demotion arrow -->
  <path d="M 610 220 Q 610 300 400 300 Q 350 300 350 220" fill="none" stroke="#cc4444" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <text x="510" y="290" text-anchor="middle" font-size="10" fill="#cc4444" font-weight="600">Demoted if contradicted</text>

  <!-- Session flow at bottom -->
  <rect x="100" y="330" width="600" height="48" rx="6" fill="#f5f5f5" stroke="#e0e0e0"/>
  <text x="400" y="350" text-anchor="middle" font-size="12" font-weight="600" fill="#444">Session ritual</text>
  <text x="400" y="368" text-anchor="middle" font-size="11" fill="#666">Before: read rules and hypotheses  |  After: write observations to inbox</text>
</svg>
