<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow4" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#117076"/>
    </marker>
    <marker id="arrow4g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Card Lifecycle</text>

  <!-- Columns -->
  <rect x="20" y="56" width="120" height="64" rx="6" fill="#e8e8e8" filter="url(#shadow4)"/>
  <text x="80" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#444">Backlog</text>
  <text x="80" y="100" text-anchor="middle" font-size="10" fill="#888">New work</text>

  <rect x="160" y="56" width="120" height="64" rx="6" fill="#e0f0f0" filter="url(#shadow4)"/>
  <text x="220" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#117076">Ready</text>
  <text x="220" y="100" text-anchor="middle" font-size="10" fill="#888">Defined enough</text>

  <rect x="300" y="56" width="120" height="64" rx="6" fill="#117076" filter="url(#shadow4)"/>
  <text x="360" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Doing</text>
  <text x="360" y="100" text-anchor="middle" font-size="10" fill="#d4f0f0">WIP limit: 4</text>

  <rect x="440" y="56" width="120" height="64" rx="6" fill="#B8953E" filter="url(#shadow4)"/>
  <text x="500" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Done</text>
  <text x="500" y="100" text-anchor="middle" font-size="10" fill="#f0e8d0">WIP limit: 2</text>

  <rect x="580" y="56" width="140" height="64" rx="6" fill="#75bcbe" filter="url(#shadow4)"/>
  <text x="650" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Validation /</text>
  <text x="650" y="94" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Rework</text>
  <text x="650" y="110" text-anchor="middle" font-size="10" fill="#e8f6f6">WIP limit: 3</text>

  <rect x="740" y="56" width="140" height="64" rx="6" fill="#2d8a4e" filter="url(#shadow4)"/>
  <text x="810" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Shipped / Live</text>
  <text x="810" y="100" text-anchor="middle" font-size="10" fill="#d0f0d8">No limit</text>

  <!-- Main flow arrows -->
  <line x1="140" y1="88" x2="158" y2="88" stroke="#117076" stroke-width="2" marker-end="url(#arrow4)"/>
  <line x1="280" y1="88" x2="298" y2="88" stroke="#117076" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- The fork: Done or direct to Shipped -->
  <!-- Direct path (default) -->
  <path d="M 420 75 Q 460 50 740 75" fill="none" stroke="#2d8a4e" stroke-width="2.5" marker-end="url(#arrow4)"/>
  <text x="580" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#2d8a4e">Default path (most cards)</text>

  <!-- Done path (exception) -->
  <line x1="420" y1="95" x2="438" y2="95" stroke="#B8953E" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- Done to VR (PO pulls) -->
  <line x1="560" y1="88" x2="578" y2="88" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow4g)"/>

  <!-- VR to Shipped -->
  <line x1="720" y1="88" x2="738" y2="88" stroke="#2d8a4e" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- Annotations -->
  <rect x="20" y="148" width="860" height="112" rx="6" fill="#f5f5f5" stroke="#e0e0e0"/>

  <circle cx="52" cy="172" r="8" fill="#2d8a4e"/>
  <text x="68" y="176" font-size="11" fill="#444"><tspan font-weight="600">Shipped/Live is the default.</tspan> Tests pass, build clean, no product decision needed: ship directly.</text>

  <circle cx="52" cy="200" r="8" fill="#B8953E"/>
  <text x="68" y="204" font-size="11" fill="#444"><tspan font-weight="600">Done is the exception.</tspan> Only for cards genuinely needing PO judgement (UI/UX, copy, architecture).</text>

  <circle cx="52" cy="228" r="8" fill="#75bcbe"/>
  <text x="68" y="232" font-size="11" fill="#444"><tspan font-weight="600">VR is the PO's pull.</tspan> Agents never move cards there. Rework happens in VR without moving back.</text>

  <text x="450" y="252" text-anchor="middle" font-size="10" fill="#888">Litmus test: "Would shipping this without the PO seeing it first risk something they'd want to change?" If no, ship it.</text>
</svg>
