<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow3" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#117076"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">How Context Survives Session Boundaries</text>

  <!-- Session 1 -->
  <rect x="30" y="58" width="260" height="220" rx="8" fill="#fff" stroke="#117076" stroke-width="2" filter="url(#shadow3)"/>
  <rect x="30" y="58" width="260" height="32" rx="8" fill="#117076"/>
  <rect x="30" y="82" width="260" height="2" fill="#117076"/>
  <text x="160" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Session 1</text>

  <text x="50" y="110" font-size="11" fill="#444" font-weight="600">Agent works on card #42</text>
  <text x="50" y="130" font-size="11" fill="#666">Implements rate limiting</text>
  <text x="50" y="150" font-size="11" fill="#666">Discovers auth pattern</text>

  <text x="50" y="180" font-size="11" font-weight="600" fill="#117076">Last 60 seconds:</text>
  <text x="50" y="198" font-size="10" fill="#444">1. Update card comment</text>
  <text x="50" y="214" font-size="10" fill="#444">2. Move card (or note remaining)</text>
  <text x="50" y="230" font-size="10" fill="#444">3. Write to knowledge inbox</text>
  <text x="50" y="246" font-size="10" fill="#444">4. Flag any blockers</text>
  <text x="50" y="266" font-size="10" fill="#cc4444" font-style="italic">Session ends. Context lost.</text>

  <!-- Persistence layer -->
  <rect x="320" y="70" width="260" height="196" rx="8" fill="#f0f9f9" stroke="#75bcbe" stroke-width="2" filter="url(#shadow3)"/>
  <text x="450" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#117076">Persistence Layer</text>
  <text x="450" y="112" text-anchor="middle" font-size="10" fill="#666">Survives between sessions</text>

  <rect x="340" y="124" width="100" height="36" rx="4" fill="#117076"/>
  <text x="390" y="146" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Board</text>

  <rect x="460" y="124" width="100" height="36" rx="4" fill="#75bcbe"/>
  <text x="510" y="146" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Knowledge</text>

  <rect x="340" y="172" width="100" height="36" rx="4" fill="#444"/>
  <text x="390" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">CLAUDE.md</text>

  <rect x="460" y="172" width="100" height="36" rx="4" fill="#B8953E"/>
  <text x="510" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Card comments</text>

  <text x="450" y="236" text-anchor="middle" font-size="10" fill="#666">Board: what's in flight</text>
  <text x="450" y="250" text-anchor="middle" font-size="10" fill="#666">Comments: handoff context</text>
  <text x="450" y="264" text-anchor="middle" font-size="10" fill="#666">Knowledge: lessons learned</text>

  <!-- Session 2 -->
  <rect x="610" y="58" width="260" height="220" rx="8" fill="#fff" stroke="#117076" stroke-width="2" filter="url(#shadow3)"/>
  <rect x="610" y="58" width="260" height="32" rx="8" fill="#117076"/>
  <rect x="610" y="82" width="260" height="2" fill="#117076"/>
  <text x="740" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Session 2 (fresh)</text>

  <text x="630" y="110" font-size="11" font-weight="600" fill="#117076">First 60 seconds:</text>
  <text x="630" y="128" font-size="10" fill="#444">1. Read CLAUDE.md (auto)</text>
  <text x="630" y="144" font-size="10" fill="#444">2. Check the board</text>
  <text x="630" y="160" font-size="10" fill="#444">3. Read card comments</text>
  <text x="630" y="176" font-size="10" fill="#444">4. Read relevant knowledge</text>
  <text x="630" y="192" font-size="10" fill="#444">5. Brief the human</text>

  <text x="630" y="220" font-size="11" font-weight="600" fill="#444">Continues card #42</text>
  <text x="630" y="240" font-size="11" fill="#666">Knows what was done</text>
  <text x="630" y="256" font-size="11" fill="#666">Applies auth pattern from</text>
  <text x="630" y="272" font-size="11" fill="#666">knowledge (learned in S1)</text>

  <!-- Arrows -->
  <line x1="290" y1="168" x2="318" y2="168" stroke="#117076" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="582" y1="168" x2="608" y2="168" stroke="#117076" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Bottom label -->
  <rect x="200" y="296" width="500" height="32" rx="6" fill="#f5f5f5" stroke="#e0e0e0"/>
  <text x="450" y="317" text-anchor="middle" font-size="12" fill="#444">No re-explaining. No lost context. The board and knowledge carry the intent.</text>
</svg>
